<!DOCTYPE html>
<html lang="en">
<head>
  <style>
    :root {
      --red-bright: #ff2a2a;
      --red-glow: rgba(224, 32, 32, 0.35);
    }
    body { background: #050505; color: white; display: flex; flex-direction: column; gap: 50px; padding: 50px; }
    
    .laser-container {
      position: relative;
      width: 100%;
      height: 100px;
      border: 1px dashed #333;
    }

    .laser {
      position: absolute;
      height: 40px; /* makes it a curve */
      width: 250px;
      border-radius: 50%;
      background: transparent;
      left: 100px;
      top: 50px;
    }
    
    .laser-1 {
      border-top: 2px solid var(--red-bright);
      mask-image: linear-gradient(to right, transparent, rgba(0,0,0,0.4) 60%, black 100%);
      -webkit-mask-image: linear-gradient(to right, transparent, rgba(0,0,0,0.4) 60%, black 100%);
      filter: drop-shadow(0 -2px 6px var(--red-bright)) drop-shadow(0 -2px 15px var(--red-glow));
    }
    .laser-2 {
      border-bottom: 2px solid var(--red-bright);
      mask-image: linear-gradient(to left, transparent, rgba(0,0,0,0.4) 60%, black 100%);
      -webkit-mask-image: linear-gradient(to left, transparent, rgba(0,0,0,0.4) 60%, black 100%);
      filter: drop-shadow(0 2px 6px var(--red-bright)) drop-shadow(0 2px 15px var(--red-glow));
    }
    
  </style>
</head>
<body>
  <div class="laser-container">
    <div class="laser laser-1"></div>
  </div>
  <div class="laser-container">
    <div class="laser laser-2"></div>
  </div>
</body>
</html>
